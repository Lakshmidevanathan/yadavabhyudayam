<!DOCTYPE html>
<html lang="sa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yadavabhyudayam</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-brand">
            <img src="images/Left.png" alt="Krishna" class="title-image">
            <div class="header-text">
                <p class="site-status-banner">TEST SITE - UNDER DEVELOPMENT</p>
                <h1 class="title-english">Yadavabhyudayam by Sri Vedanta Desika</h1>
                <nav class="chapter-nav">
                    <label for="sarga-select">Sarga:</label>
                    <select id="sarga-select"></select>
                </nav>
                <div class="script-toggle" role="group" aria-label="Script language">
                    <button type="button" id="btn-script-sanskrit" class="script-toggle-btn is-active" aria-pressed="true">Sanskrit</button>
                    <button type="button" id="btn-script-tamil" class="script-toggle-btn" aria-pressed="false">Tamil</button>
                </div>
            </div>
            <img src="images/Right.png" alt="Krishna with calf" class="title-image">
        </div>
    </header>

    <main id="shloka-container">
        <section class="shloka-card">
            <div class="shloka-header">
                <div class="shloka-header-row shloka-header-row-nav">
                    <span id="shloka-label" class="shloka-label"></span>
                    <nav class="card-nav navigation" aria-label="Shloka navigation (top)">
                        <button type="button" class="nav-btn nav-prev">← Previous</button>
                        <button type="button" class="nav-btn nav-next">Next →</button>
                    </nav>
                </div>
                <div class="shloka-header-row shloka-header-row-audio">
                    <div class="audio-block audio-block-shloka">
                        <div class="audio-label-row">
                            <span class="audio-label">🔊 Shloka</span>
                            <audio id="shloka-audio-shloka" class="shloka-audio-player" controls preload="none"></audio>
                        </div>
                    </div>
                    <div class="audio-block audio-block-meaning">
                        <div class="audio-label-row">
                            <span class="audio-label">🔊 Meaning</span>
                            <audio id="shloka-audio-meaning" class="shloka-audio-player" controls preload="none"></audio>
                        </div>
                    </div>
                </div>
            </div>

            <div class="shloka-section">
                <p id="shloka-sanskrit" class="sanskrit-text"></p>
            </div>

            <div class="shloka-section">
                <p id="shloka-translation" class="translation-text"></p>
            </div>

            <div class="shloka-section">
                <table id="word-meanings-table" class="word-meanings">
                    <tbody></tbody>
                </table>
            </div>

            <div class="shloka-section">
                <h2>Anvaya</h2>
                <p id="shloka-anvaya" class="sanskrit-text"></p>
            </div>
        </section>
    </main>

    <footer class="navigation">
        <button type="button" id="btn-prev" class="nav-btn nav-prev">← Previous</button>
        <span id="page-indicator" class="page-indicator"></span>
        <button type="button" id="btn-next" class="nav-btn nav-next">Next →</button>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@indic-transliteration/sanscript@1.3.3/sanscript.min.js"></script>
    <script src="script.js?v=20250522"></script>
</body>
</html>
