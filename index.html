<!DOCTYPE html>
<html lang="sa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>यादवाभ्युदयम् — Yadavabhyudayam</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-brand">
            <img src="images/Left.png" alt="Krishna" class="title-image">
            <div class="header-text">
                <h1 class="title-sanskrit">यादवाभ्युदयम्</h1>
                <p class="title-english">Yadavabhyudayam by Sri Vedanta Deshika</p>
                <nav class="chapter-nav">
                    <label for="sarga-select">Sarga:</label>
                    <select id="sarga-select"></select>
                </nav>
            </div>
            <img src="images/Right.png" alt="Krishna with calf" class="title-image">
        </div>
    </header>

    <main id="shloka-container">
        <section class="shloka-card">
            <div class="shloka-header">
                <span id="shloka-label" class="shloka-label"></span>
                <nav class="card-nav navigation" aria-label="Shloka navigation (top)">
                    <button type="button" class="nav-btn nav-prev">← Previous</button>
                    <span class="page-indicator"></span>
                    <button type="button" class="nav-btn nav-next">Next →</button>
                </nav>
            </div>

            <div class="shloka-section audio-section">
                <div class="audio-controls-wrap">
                    <span class="audio-label">🔊 Listen</span>
                    <div class="audio-part-nav" id="audio-part-nav" hidden>
                        <button type="button" class="part-nav-btn audio-part-prev" aria-label="Previous audio part">Part ←</button>
                        <span id="audio-part-indicator" class="audio-part-indicator"></span>
                        <button type="button" class="part-nav-btn audio-part-next" aria-label="Next audio part">Part →</button>
                    </div>
                </div>
                <audio id="shloka-audio" controls>
                    <source id="audio-source" src="" type="audio/mpeg">
                    Your browser does not support the audio element.
                </audio>
            </div>

            <div class="shloka-section">
                <h2>श्लोकः (Shloka)</h2>
                <p id="shloka-sanskrit" class="sanskrit-text"></p>
            </div>

            <div class="shloka-section">
                <h2>Translation</h2>
                <p id="shloka-translation" class="translation-text"></p>
            </div>

            <div class="shloka-section">
                <h2>पदच्छेदः (Padaccheda)</h2>
                <p id="shloka-padaccheda" class="sanskrit-text padaccheda-text"></p>
            </div>

            <div class="shloka-section">
                <h2>Word Meanings</h2>
                <table id="word-meanings-table" class="word-meanings">
                    <thead>
                        <tr>
                            <th>Word</th>
                            <th>Meaning</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>

            <div class="shloka-section">
                <h2>अन्वयः (Anvaya)</h2>
                <p id="shloka-anvaya" class="sanskrit-text"></p>
            </div>
        </section>
    </main>

    <footer class="navigation">
        <button type="button" id="btn-prev" class="nav-btn nav-prev">← Previous</button>
        <span id="page-indicator" class="page-indicator"></span>
        <button type="button" id="btn-next" class="nav-btn nav-next">Next →</button>
    </footer>

    <script src="script.js"></script>
</body>
</html>
